# RealSense D435i Camera Configuration
camera:
  type: "intelrealsense"       # intelrealsense | mock | zmq
  serial: ""                   # camera serial number, empty = auto-detect
  resolution:
    width: 640
    height: 480
  fps: 30
  depth_scale: 0.001           # depth units to meters (D435i default: 0.001)
  align_depth_to_color: true
  color_format: "rgb"          # rgb | bgr
  warmup_frames: 30
  min_depth: 0.15              # meters
  max_depth: 5.0               # meters

# Mock mode settings (used when type=mock or no camera found)
mock:
  data_path: "data/raw"        # path to saved .npz files for mock playback
  width: 640
  height: 480
  fps: 15
  scene: "corridor"            # empty | single_box | corridor | pallet_marker | cluttered_lab
